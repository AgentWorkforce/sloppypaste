<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Sloppypaste social card">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fbf7ef" />
      <stop offset="100%" stop-color="#f5f0e4" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="920" cy="120" r="180" fill="#e9c3b5" opacity="0.45" />
  <rect x="72" y="72" width="1056" height="486" rx="32" fill="#fffaf0" stroke="#d8c7bc" />
  <text x="120" y="170" fill="#86412c" font-family="Arial Narrow, Aptos Narrow, sans-serif" font-size="30" letter-spacing="6" text-transform="uppercase">
    SLOPPYPASTE
  </text>
  <text x="120" y="270" fill="#1f2430" font-family="Georgia, Palatino, serif" font-size="78">
    <tspan x="120" dy="0">You may have just</tspan>
    <tspan x="120" dy="92">sloppypasted someone.</tspan>
  </text>
  <text x="120" y="455" fill="#5e5a54" font-family="Georgia, Palatino, serif" font-size="34">
    <tspan x="120" dy="0">Use AI all you want.</tspan>
    <tspan x="120" dy="48">Just don't make other people read the whole output for you.</tspan>
  </text>
</svg>
